      FE[Django dashboard] --> S
  caption: Inside the FastMCP server
- id: backends
  title: Three ways to execute
  kind: table
  columns:
  - backend
  - how it works
  - best for
  rows:
  - - Native in-process context
    - Runs keywords inside a live RF 7.x context via EXECUTION_CONTEXTS and Namespace
    - Fast
    - stateful
    - interactive step-building
  - - Attach bridge
    - Talks to a real RF process over HTTP on port 7317 using the McpAttach library
    - Reusing a live debugger session from your IDE
  - - Suite run
    - Shells out to robot or run_cli and parses output.xml
    - Full runs and dry runs of finished suites
- id: attach
  title: The attach bridge, briefly
  kind: mermaid
  diagram_type: flowchart
  source: |
    flowchart LR
      IDE[VS Code · RobotCode debugger] --> RFP[Your running RF process]
      RFP --> LIB[McpAttach library]
      LIB --> HS[HTTP server · 127.0.0.1:7317]
      CL[ExternalRFClient] -->|X-MCP-Token| HS
      COR[ExecutionCoordinator] --> CL
  caption: Reusing a live RF process from the IDE via the attach bridge
- id: tools
  title: The toolbox
  kind: table
  columns:
  - tool
  - what it does
  rows:
  - - analyze_scenario
    - Turn a plain-language scenario into a structured plan
  - - recommend_libraries
    - Suggest the right Robot Framework libraries for the job
  - - find_keywords / get_keyword_info
    - Discover keywords and read their signatures
  - - execute_step / execute_batch / execute_flow
    - Run keywords in the live context — one step or many
  - - intent_action
    - High-level intent-based actions
    - friendly to small models
  - - manage_session
    - Create
    - inspect
    - and switch test sessions
  - - build_test_suite
    - Write a clean .robot file from the validated steps
  - - run_test_suite
    - Execute the suite and report what happened
  - - manage_attach
    - Connect to a live RF process via the attach bridge
  - - recall_step / recall_fix / recall_locator
    - Optional memory — reuse what worked last time
- id: features
  title: What you get
  kind: prose
  body: |
    Natural-language test generation. Interactive, stepwise keyword execution with real-time DOM and page-source inspection. Multi-library support for Browser, Selenium, Appium, Requests, and Database libraries. BDD and data-driven generation when you want Given/When/Then or parameterized templates. Optional persistent memory that recalls successful steps, locators, and known fixes across sessions. A debug attach bridge to reuse a live execution context from your IDE. And an optional dashboard, because sometimes you just want to watch it work.
