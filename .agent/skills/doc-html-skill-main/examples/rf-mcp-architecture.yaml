- id: overview
  title: The short version
  kind: prose
  body: |
    Robot Framework is the Swiss Army knife of automation. rf-mcp hands that knife to your AI agent without anyone getting hurt. It is a Model Context Protocol server that turns a plain-language test idea into a real, reviewable Robot Framework suite — by discovering keywords, executing them interactively against a live execution context, checking the results, and only then writing the final .robot file. Web, mobile, API, database: same workflow, different libraries.
- id: why-it-matters
  title: Why this matters
  kind: callout
  intent: tip
  body: Generated tests are validated against a live RF context before they are written down — no blind
    code generation, no brittle output.
- id: architecture
  title: How it fits together
  kind: mermaid
  diagram_type: flowchart
  source: |
    flowchart LR
      subgraph Client["AI client"]
        A[Claude · Cline · VS Code]
      end
      subgraph Server["rf-mcp · FastMCP server"]
        B[MCP tools and prompts]
        C[ExecutionCoordinator]
      end
      subgraph Backends["Execution backends"]
        D[Native in-process RF context]
        E[Attach bridge to live RF]
        F[Suite run via robot CLI]
      end
      G[Robot Framework 7.x]
      A -->|MCP · STDIO or HTTP| B
      B --> C
      C --> D
      C --> E
      C --> F
      D --> G
      E --> G
      F --> G
  caption: AI client → FastMCP server → three execution backends → Robot Framework 7.x
- id: flow
  title: From plain words to a passing suite
  kind: mermaid
  diagram_type: sequence
  source: |
    sequenceDiagram
      actor Eng as Engineer
      participant AI as AI agent
      participant MCP as rf-mcp
      participant RF as Live RF context
      Eng->>AI: Describe the test in plain words
      AI->>MCP: analyze_scenario + recommend_libraries
      MCP-->>AI: A plan and the right libraries
      AI->>MCP: find_keywords
      MCP-->>AI: Matching keywords and signatures
      loop Build it step by step
        AI->>MCP: execute_step
        MCP->>RF: Run the keyword in a live context
        RF-->>MCP: Result, page source, state
        MCP-->>AI: Feedback for the next move
      end
      AI->>MCP: build_test_suite
      MCP-->>Eng: A clean .robot suite
      AI->>MCP: run_test_suite
      MCP-->>Eng: Pass or fail, with the receipts
  caption: From a plain-language description to a validated, passing suite
