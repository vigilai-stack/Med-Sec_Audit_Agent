schema_version: 2
artifact_type: architecture-review
title: rf-mcp
subtitle: Where AI agents meet Robot Framework
audience:
- Test & automation engineers
- QA professionals
- The Robot Framework community
status: draft
owner: RobotMCP
updated_at: '2026-05-30'
theme:
  mode: auto
  brand: robot-framework
  density: comfortable
summary:
- rf-mcp is the handshake between your AI agent and Robot Framework. Describe a test in plain words, get
  a working .robot suite back.
- It does not guess. Keywords run in a live Robot Framework context, step by step, with real feedback
  before a single line is written down.
- Three execution backends — in-process, attach-to-live, and full CLI runs — because one size never fits
  all.
- Built on FastMCP and Robot Framework 7, with small-LLM optimizations so lighter models keep up.
- Web, mobile, API, database. If it needs automating, it is probably in scope.
decisions:
- title: Run keywords in a live, in-process RF context
  rationale: Keeps execution stateful and interactive — live variables, real page source, immediate feedback
    — instead of writing code blind and hoping.
  status: adopted
  ref: ADR-020
- title: Offer three execution backends, not one
  rationale: In-process for speed and state, attach-to-live for reusing a debugger session, CLI for full
    and dry suite runs.
  status: adopted
- title: Discover keywords by reflection, not runtime Libdoc
  rationale: Read live library instances directly with Python introspection — faster, and it sees exactly
    what is loaded.
  status: adopted
- title: Optimize for small LLMs
  rationale: Tool profiles, intent-based actions, and response/state compression keep token budgets honest.
  status: adopted
constraints:
- text: MCP STDIO shares one JSON-RPC channel, so Robot Framework console output is redirected and suppressed
    to keep the stream clean.
  severity: high
- text: Requires Robot Framework 7.0+ — it leans on the RF 7.x running APIs.
  severity: medium
- text: The attach bridge listens on 127.0.0.1:7317 and expects an X-MCP-Token header.
  severity: medium
- text: Browser, mobile, and database features need the matching install extra.
  severity: info
interfaces:
- MCP over STDIO — command "uv run -m robotmcp.server"
- MCP over HTTP — http://localhost:8000/mcp
- Attach bridge — HTTP on 127.0.0.1:7317
- Console entry point — robotmcp = robotmcp.server:main
deployment_context: |
  Runs as a local MCP server right next to your editor, or in Docker (ghcr.io/manykarim/rf-mcp), exposing MCP on port 8000 and an optional Django dashboard for watching sessions in real time.
alternatives:
- Generate .robot files straight from a prompt — rejected. No validation, brittle output, and it breaks
  the moment a locator moves.
- Subprocess-only execution — rejected. You lose live state and the step-by-step feedback that makes this
  useful.
sections:
- id: at-a-glance
  title: At a glance
  kind: stats
