  title: Inside the server
  kind: mermaid
  diagram_type: flowchart
  source: |
    flowchart TD
      S[server.py · FastMCP] --> CO[ExecutionCoordinator]
      CO --> KE[KeywordExecutor]
      CO --> SM[SessionManager]
      CO --> PS[PageSourceService]
      CO --> SE[SuiteExecutionService]
      CO --> NC[rf_native_context_manager]
      CO --> XC[external_rf_client]
      S --> KD[keyword_discovery · reflection]
      S --> LR[library_recommender]
      S --> NLP[nlp_processor]
      S --> TB[test_builder]
      OPT[optimization · small-LLM] --> S
