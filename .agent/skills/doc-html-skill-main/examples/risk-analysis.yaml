schema_version: 2
artifact_type: risk-analysis
title: Checkout Risk Review
subtitle: Payment orchestration risk register
audience:
- QA
- Product
- Operations
status: draft
owner: QA Lead
updated_at: '2026-05-30'
triggers:
- PSP latency spike
- Deploy of the checkout service
controls:
- Circuit breaker on PSP calls
- Idempotency keys on authorize requests
residual_risk: Medium until retry policy and fallback UX are defined.
owners:
- Payments on-call
review_cadence: Monthly, and after any payment incident.
summary:
- Timeout handling is unclear.
- Auditability is incomplete.
sections:
- id: risk-heatmap
  title: Risk heat map
  kind: heatmap
  x_labels:
  - Rare
  - Unlikely
  - Possible
  - Likely
  - Almost certain
  y_labels:
  - Severe
  - Major
  - Moderate
  - Minor
  - Negligible
  cells:
  - x: 2
    y: 0
    level: 4
    label: PSP outage
  - x: 3
    y: 1
    level: 4
    label: Slow auth
  - x: 2
    y: 2
    level: 3
    label: Dup charge
  - x: 1
    y: 2
    level: 2
    label: Audit gap
  - x: 1
    y: 3
    level: 1
    label: UI glitch
- id: risk-matrix
  title: Risk matrix
  kind: table
  columns:
  - risk
  - likelihood
  - impact
  - mitigation
  rows:
  - - PSP timeout without retry policy
    - medium
    - high
    - Define retry policy and fallback UX
  - - Duplicate charge on retry
    - low
    - high
    - Enforce idempotency keys
  - - Missing audit trail
    - medium
    - medium
    - Add structured payment audit log
- id: concentration
  title: Risk concentration
  kind: mermaid
  diagram_type: flowchart
  source: |
    flowchart LR
      A[Checkout] --> B{PSP call}
      B -->|timeout| C[Retry gap]
      B -->|error| D[Unclear UX]
      C --> E[Risk: duplicate charge]
      D --> F[Risk: abandoned cart]
evidence:
- label: Incident IR-204
  href: docs/incidents/ir-204.md
export:
  pdf: true
  freeze_diagrams: false
