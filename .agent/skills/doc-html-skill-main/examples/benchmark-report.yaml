  - - Skill (rendered from YAML)
    - 10 / 10 pass
    - 10 / 10 pass
    - '10'
- id: quality-note
  title: Why the quality gap exists
  kind: prose
  body: |
    The skill's renderer owns the theme, contrast tokens, and responsive layout, so every rendered document is accessible and mobile-safe by construction. Hand-written HTML failed mostly on color contrast (brand colors used as text) and horizontal overflow on mobile — the exact things a renderer gets right once and forever. All twenty documents met the content brief (3+ diagrams, 2+ tables); they differed in whether they were usable.
- id: verdict
  title: So, should you use a skill?
  kind: prose
  body: |
    Use the skill when you regenerate or edit often (the schema-loading cost amortizes, and you re-emit only changed YAML), when accessibility and brand consistency are requirements rather than hopes, or when you want a diffable canonical source in git. Skip it for a single throwaway page judged purely on token cost, or when pairing it with a small model that will churn against the schema. The skill is a quality-and-reuse instrument that happens to also cut authoring tokens on capable models — not a blanket token-saver.
- id: caveats
  title: Read this before quoting the numbers
  kind: prose
  body: |
    Small N (1-3 per cell, 20 good runs) means magnitudes are directional; the direction repeats across four independent models, which is the real evidence. Cross-agent absolute numbers are not comparable. Codex reports no per-run cost and rate-limited mid-experiment. And because the harness fed agents the raw JSON schemas, the skill's input overhead measured here is an upper bound — native skill loading would be cheaper.
