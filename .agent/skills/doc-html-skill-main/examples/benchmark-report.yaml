schema_version: 2
artifact_type: architecture-review
title: 'Skills vs. No Skills: Token Usage in HTML Doc Generation'
subtitle: A controlled benchmark across four CLI coding agents
audience:
- Engineering
- Platform / DX
- Anyone weighing "should we build a skill for this?"
status: approved
owner: Doc-HTML Skill benchmark
updated_at: '2026-05-31'
summary:
- Skills change WHAT the model writes, not just how much. Three of four agents wrote FEWER output tokens
  with the skill (Claude −35%, Codex −32%, OpenCode −8%); the smallest model (MiniMax/Kilo) wrote MORE
  (+28%) because it churned.
- 'For a single document, skills cost MORE in total: total token load rose 2.7x–5.0x and price rose +10%
  (Claude) to +116% (Kilo). The renderer is cheap; reading schemas and iterating the tool is not.'
- 'Quality is where skills win outright: skill output passed WCAG-AA accessibility and responsive checks
  10/10; hand-written HTML passed only 1/10 and 2/10.'
- 'Net: skills trade higher one-shot compute for lower authoring effort, guaranteed quality, and a reusable
  canonical source. They pay off with repetition and quality requirements — not as a raw token saving
  on a throwaway page.'
decisions:
- title: Compare WITHIN each tool, not across tools
  rationale: Each CLI runs a different model and tokenizer, so absolute numbers are not comparable. The
    skill-vs-no-skill delta for the same model is the valid measurement.
  status: method
- title: Fix the content, vary only the method
  rationale: All facts were supplied in the prompt (a fictional "PaySwift" service), so no web research
    could add variance. We measured generation, not retrieval.
  status: method
constraints:
- N is small (1-3 runs per cell, 20 successful runs total). Treat magnitudes as directional; trust the
  direction, which repeats across independent models.
- Codex reports no per-run cost in its JSONL, so its cost cells are blank. Codex also rate-limited mid-run,
  capping it at noskill x2 / skill x1.
- The benchmark handed agents the raw JSON schemas to read, which inflates the skill's INPUT cost vs native
  skill loading (a concise SKILL.md + lazy schema reads). The skill's token overhead here is an upper
  bound.
sections:
- id: tldr
  title: The one-paragraph version
  kind: prose
  body: |
    We asked four CLI coding agents (Claude Code, Codex, OpenCode, Kilo) to produce the same branded HTML documentation two ways: by hand ("no-skill") and via a schema-first skill where the model writes compact YAML and a deterministic renderer owns all the HTML, CSS, and diagrams ("skill"). The skill reliably shrinks the part a human reviews and reuses, and it makes the output correct by construction. It does not make a single run cheaper in total tokens. Both things are true, and which one matters depends on how often you regenerate and whether quality is negotiable.
- id: method
  title: How the experiment ran
  kind: mermaid
  diagram_type: flowchart
  source: |
    flowchart LR
      B[Fixed brief\nPaySwift facts] --> P{Condition}
      P -->|no-skill| H[Agent writes\ndoc.html by hand]
      P -->|skill| Y[Agent writes doc.yaml] --> R[render.py] --> SH[doc.html]
      H --> M[Capture metrics]
      SH --> M
      M --> Q[Validate quality\nWCAG-AA + responsive]
      M --> T[Tokens, cost, time,\ntool calls, file edits]
- id: setup
  title: Experimental matrix
  kind: table
  columns:
  - agent
  - model
  - runs noskill
  - runs skill
  rows:
  - - Claude Code
    - claude-opus-4-8 (1M)
    - '3'
    - '3'
  - - Codex
    - codex / GPT
    - '2'
    - '1'
  - - Kilo
    - MiniMax-M2.7
    - '2'
    - '3'
  - - OpenCode
    - qwen3.7-max
    - '3'
    - '3'
- id: out-tokens
  title: 'Finding 1 — output tokens: mostly down, but not for everyone'
  kind: prose
  body: |
    Output tokens are the model's actual authoring work. With the skill the model writes compact YAML instead of a full HTML page, so larger models emit less. Claude dropped 35% and Codex 32%. OpenCode barely moved (−8%). Kilo, the smallest model, went the other way (+28%): it re-read the schema, retried the renderer, and spent output tokens on tool-call arguments. The lesson is blunt — the authoring saving scales with model capability.
- id: out-chart
  title: Change in model output tokens with the skill (negative = saving)
  kind: mermaid
  diagram_type: xychart
  source: |
    xychart-beta
      title "Output-token change with skill (%)"
      x-axis ["Claude", "Codex", "Kilo", "OpenCode"]
      y-axis "percent change vs no-skill" -40 --> 40
      bar [-35, -32, 28, -8]
- id: total-tokens
  title: Finding 2 — total tokens and cost go UP for one document
  kind: prose
  body: |
    Output is only part of the bill. With the skill the agent must read the JSON schemas, run the renderer, and sometimes debug it — so input and cached tokens balloon. Total token load rose between 2.7x (OpenCode, Codex) and 5.0x (Kilo). Price followed: +10% for Claude, +41% for OpenCode, +116% for Kilo. The overhead is fixed per run, so it stings most on the cheapest, smallest models and is nearly free on the largest. For a one-shot throwaway page, no-skill is cheaper.
- id: total-chart
  title: Total token load multiplier (skill divided by no-skill)
  kind: mermaid
  diagram_type: xychart
  source: |
    xychart-beta
      title "Total tokens: skill is N times no-skill"
      x-axis ["Claude", "Codex", "Kilo", "OpenCode"]
      y-axis "x times no-skill" 0 --> 6
      bar [3.8, 2.7, 5.0, 2.7]
