schema_version: 2
artifact_type: user-story-review
title: Saved Payment Methods
subtitle: Returning shoppers reuse a stored card at checkout
audience:
- Product
- Design
- Engineering
status: in-review
owner: Payments PM
updated_at: '2026-05-30'
as_a: returning shopper
i_want: to reuse a previously saved card
so_that: I can check out faster without re-entering details
acceptance_criteria:
- Saved cards are listed at checkout for authenticated users.
- Selecting a saved card skips manual card entry.
- A card can be removed from the saved list.
- CVV re-entry is required when the risk score is elevated.
personas:
- Frequent buyer
- Occasional buyer
journey_states:
- Browse
- Checkout
- Select saved card
- Confirm
- Paid
dependencies:
- Tokenization service must expose stored-card metadata.
summary:
- Scope is clear for the happy path; risk-based CVV rules need detail.
- Card removal UX is unspecified.
sections:
- id: scope
  title: Scope and assumptions
  kind: prose
  body: |
    Covers listing, selecting, and removing saved cards for authenticated shoppers. Guest checkout and adding new cards are out of scope here.
- id: journey
  title: Checkout journey
  kind: mermaid
  diagram_type: journey
  source: |
    journey
      title Returning shopper checkout
      section Checkout
        View saved cards: 4: Shopper
        Select a card: 5: Shopper
        Confirm payment: 4: Shopper
- id: acceptance
  title: Acceptance criteria status
  kind: table
  columns:
  - criterion
  - status
  - notes
  rows:
  - - List saved cards
    - ready
    - Depends on tokenization metadata
  - - Skip manual entry
    - ready
    - ''
  - - Remove a card
    - open
    - UX undefined
  - - Risk-based CVV
    - open
    - Threshold not specified
evidence:
- label: Tokenization API
  href: services/tokenization/README.md
export:
