schema_version: 2
artifact_type: architecture-review
title: Checkout Service Review
subtitle: Proposed payment orchestration changes
audience:
- Engineering
- QA
- Product
status: draft
owner: Architecture Guild
updated_at: '2026-05-30'
theme:
  mode: dark
  brand: default
  density: comfortable
summary:
- Retry handling is underspecified for PSP timeouts.
- Fraud decision ownership is split across services.
- Observability requirements are incomplete.
decisions:
- title: Centralize payment orchestration in the checkout service
  rationale: Reduces cross-service retry ambiguity and clarifies ownership.
  status: proposed
constraints:
- PSP authorize call has a hard 8s upstream timeout.
- PCI scope must stay within the existing tokenization boundary.
interfaces:
- POST /checkout (web -> api)
- Authorize (api -> PSP)
deployment_context: Runs in the payments cluster behind the API gateway.
alternatives:
- Keep orchestration in the web tier (rejected; duplicates retry logic).
sections:
- id: context
  title: Context
  kind: prose
  body: |
    This review covers the checkout orchestration path for card payments. It focuses on retry behavior, fraud decision ownership, and the observability gaps surfaced during the last incident review.
- id: sequence
  title: Current interaction flow
  kind: mermaid
  diagram_type: sequence
  source: |
    sequenceDiagram
      actor User
      participant Web
      participant API
      participant PSP
      User->>Web: Submit order
      Web->>API: POST /checkout
      API->>PSP: Authorize payment
      PSP-->>API: Result
      API-->>Web: Confirmation or error
- id: findings
  title: Findings
  kind: table
  columns:
  - finding
  - severity
  - recommendation
  rows:
  - - Retry policy undefined
    - high
    - Define retry/backoff and failure UX
  - - Fraud ownership split
    - medium
    - Assign a single decision owner
  - - Observability incomplete
    - medium
    - Add span coverage for PSP calls
evidence:
- label: ADR-17
  href: docs/adr/017-payment-orchestration.md
- label: API checkout handler
  href: services/checkout/handler.ts
export:
  pdf: true
  freeze_diagrams: false
